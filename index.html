    <script>
      window.addEventListener('error', function(e) {
        if (!document.getElementById('error-box')) {
          document.body.innerHTML += '<div id="error-box" style="position:fixed;top:0;left:0;z-index:999999;background:red;color:white;padding:20px;width:100%;font-size:20px;box-sizing:border-box;max-height:100vh;overflow:auto;"><b>CRASH ERROR:</b><br/>' + e.message + '<br/><br/><b>File:</b> ' + e.filename + ':' + e.lineno + '</div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        if (!document.getElementById('error-box-promise')) {
          document.body.innerHTML += '<div id="error-box-promise" style="position:fixed;top:100px;left:0;z-index:999999;background:darkred;color:white;padding:20px;width:100%;font-size:20px;box-sizing:border-box;max-height:100vh;overflow:auto;"><b>PROMISE ERROR:</b><br/>' + e.reason + '</div>';
